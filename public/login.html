<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - JobBoard</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
      }
      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-header h1 {
        font-size: 1.75rem;
        color: var(--text-main);
      }
      .error-msg {
        background: #fee2e2;
        color: #991b1b;
        padding: 0.75rem;
        border-radius: var(--radius);
        margin-bottom: 1rem;
        font-size: 0.875rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card login-card">
      <div class="login-header">
        <a href="/" class="logo" style="display: block; margin-bottom: 1rem"
          >JobBoard</a
        >
        <h1>Welcome Back</h1>
        <p class="text-muted">Enter your credentials to access your account</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="name@company.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <button
          type="submit"
          id="submitBtn"
          class="btn btn-primary"
          style="width: 100%; padding: 0.75rem; margin-top: 1rem"
          disabled
        >
          Loading...
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-muted" style="font-size: 0.875rem">
          Don't have an account?
          <a
            href="/register.html"
            style="
              color: var(--primary-color);
              font-weight: 600;
              text-decoration: none;
            "
          >
            Create one
          </a>
        </p>
      </div>
    </div>

    <!-- Auth0 SDK v1.22 - Mais estável -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/1.22/auth0-spa-js.production.js"></script>
    <script>
      (function () {
        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");
        const submitBtn = document.getElementById("submitBtn");

        let auth0 = null;

        async function initAuth0() {
          try {
            console.log("Iniciando Auth0...");
            console.log(
              "createAuth0Client disponível?",
              typeof window.createAuth0Client,
            );

            if (typeof window.createAuth0Client === "undefined") {
              throw new Error("Auth0 SDK não carregou. Verifique sua conexão.");
            }

            auth0 = await window.createAuth0Client({
              domain: "dev-5gi0tc0lpw0623nw.us.auth0.com",
              client_id: "HJndHKMm7rXtPLc80NBZg5GU7qrx4nzK",
              redirect_uri: "https://localhost:3000/login.html",
              audience: "https://myapisecret/",
            });

            console.log("Auth0 client created");

            // Check if we are returning from login redirect
            const query = window.location.search;
            if (query.includes("code=") && query.includes("state=")) {
              console.log("Processing callback...");
              submitBtn.textContent = "Authenticating...";

              try {
                await auth0.handleRedirectCallback();
                window.history.replaceState({}, document.title, "/login.html");
              } catch (e) {
                console.error("Error on callback:", e);
                throw e;
              }
            }

            // Se já estiver logado
            const isAuthenticated = await auth0.isAuthenticated();

            if (isAuthenticated) {
              submitBtn.textContent = "Redirecting...";
              const user = await auth0.getUser();
              const token = await auth0.getTokenSilently();

              console.log("Token:", token);
              saveSession(token, user);
            } else {
              submitBtn.disabled = false;
              submitBtn.textContent = "Sign In";
            }
          } catch (err) {
            console.error("Erro completo:", err);
            errorMsg.textContent =
              err.message || "Falha ao inicializar autenticação";
            errorMsg.style.display = "block";
            submitBtn.textContent = "Error";
            submitBtn.disabled = true;
          }
        }

        function saveSession(token, user) {
          localStorage.setItem("token", token);
          localStorage.setItem("user", JSON.stringify(user));

          const role = user["https://jobboard.example.com/role"];
          console.log("Role do usuário:", role);

          if (role === "ADMIN") {
            window.location.href = "/admin-dashboard.html";
          } else if (role === "COMPANY") {
            window.location.href = "/companyDashboard.html";
          } else {
            window.location.href = "/jobList.html";
          }
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          if (!auth0) {
            errorMsg.textContent =
              "System is not ready. Please reload the page.";
            errorMsg.style.display = "block";
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Signing in...";

          try {
            console.log("Starting loginWithRedirect...");
            await auth0.loginWithRedirect({
              redirect_uri: "https://localhost:3000/login.html",
            });
          } catch (err) {
            console.error("Error on login:", err);
            errorMsg.textContent = err.message || "Falha no login";
            errorMsg.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.textContent = "Sign In";
          }
        });

        // Aguarda um pouco para garantir que o script carregou
        window.addEventListener("load", function () {
          setTimeout(initAuth0, 200);
        });
      })();
    </script>
  </body>
</html>
